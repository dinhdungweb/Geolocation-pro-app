version: '3'

services:
  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database URL inside the container network
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/geolocation_app?schema=public
      - NODE_ENV=production
      - PORT=3000
      # ENV variables passed from host .env file
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - SCOPES=${SCOPES}
      - HOST=${HOST}
      - SHOPIFY_APP_URL=${SHOPIFY_APP_URL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - VPN_CHECK_API_URL=${VPN_CHECK_API_URL}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=rootpassword
      - POSTGRES_DB=geolocation_app
    volumes:
      - db_data:/var/lib/postgresql/data

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  db_data:
  caddy_data:
  caddy_config:
